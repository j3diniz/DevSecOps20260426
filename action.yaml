name: 'Soma'
author: 'J3di'
description: 'Somar dois números.'
inputs:
  a:
    required: true
  b:
    required: true
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6 # Upgrade from v4 to v6
      with:
        python-version: '3.12'

    - name: run Soma
      shell: bash
      run: python soma.py -d=${{ inputs.a }} -l=${{ inputs.b }}
